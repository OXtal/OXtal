# @package _global_
loss:
  diffusion_lddt_chunk_size: 1
  diffusion_bond_chunk_size: 1
  diffusion_chunk_size_outer: -1
  diffusion_sparse_loss_enable: "loss_metrics_sparse_enable"
  diffusion_lddt_loss_dense: true # only set true in initial training for training speed
  resolution:
    min: 0.1
    max: 4.0
  weight:
    alpha_confidence: 1e-4
    alpha_pae: 0.0 # or 1 in finetuning stage 3
    alpha_except_pae: 1.0
    alpha_diffusion: 4.0
    alpha_distogram: 3e-2
    alpha_bond: 0.0 # or 1 in finetuning stages
    smooth_lddt: 1.0 # or 0 in finetuning stages
    alpha_decoder: 1.0
  plddt:
    min_bin: 0
    max_bin: 100
    no_bins: 50
    eps: 1e-6
  pde:
    min_bin: 0
    max_bin: 32
    no_bins: 64
    eps: 1e-6
  resolved:
    eps: 1e-6
  pae:
    min_bin: 0
    max_bin: 32
    no_bins: 64
    eps: 1e-6
  diffusion:
    mse:
      weight_mse: 0.3333333333333333
      weight_dna: 5.0
      weight_rna: 5.0
      weight_ligand: 10.0
      eps: 1e-6
    bond:
      eps: 1e-6
    smooth_lddt:
      eps: 1e-6
  distogram:
    min_bin: 2.3125
    max_bin: 21.6875
    no_bins: 64
    eps: 1e-6
metrics:
  lddt:
    eps: 1e-6
  complex_ranker_keys: ["plddt", "gpde", "ranking_score"]
  chain_ranker_keys: ["chain_ptm", "chain_plddt"]
  interface_ranker_keys:
    ["chain_pair_iptm", "chain_pair_iptm_global", "chain_pair_plddt"]
  clash:
    af3_clash_threshold: 1.1
    vdw_clash_threshold: 0.75
