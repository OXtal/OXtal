# @package _global_
is_v1_architecture: true
c_s: 384
c_z: 128
c_s_inputs: 451 # c_s_inputs == c_token + 33 + 33 + 1
c_atom: 128
c_atompair: 16
c_token: 384
n_blocks: 4
max_atoms_per_token: 24 # DNA G max_atoms = 23
no_bins: 64
sigma_data: 16.0
diffusion_batch_size: 32
diffusion_chunk_size: null
blocks_per_ckpt: 1 # Number of blocks in each activation checkpoint, if None, no checkpointing
use_memory_efficient_kernel: false
use_deepspeed_evo_attention: true
use_flash: false
use_lma: false
find_unused_parameters: false
dtype: "bf16"
loss_metrics_sparse_enable: true
skip_amp:
  sample_diffusion: true
  loss: true
infer_setting:
  chunk_size: 256 # set to null for normal training and small dataset eval
  sample_diffusion_chunk_size: 1 # set to null for normal training and small dataset eval
  lddt_metrics_sparse_enable: "loss_metrics_sparse_enable"
  lddt_metrics_chunk_size: 1 # only works if loss_metrics_sparse_enable, can set as default 1
inference_noise_scheduler:
  s_max: 160.0
  s_min: 4e-4
  rho: 7
  sigma_data: 16.0 # in EDM, this is 1.0
recycling_distance_calculator:
  dist_bin_min: 2.0
  dist_bin_max: 12.0
  num_bins: 20
sample_diffusion:
  gamma0: 0.8
  gamma_min: 1.0
  noise_scale_lambda: 1.003
  step_scale_eta: 1.5
  N_step: 200
  N_sample: 5
  N_step_mini_rollout: 20
  N_sample_mini_rollout: 1
model:
  N_model_seed: 1 # for inference
  N_cycle: 2
  N_full_cycle: 1
  input_embedder:
    c_atom: ${c_atom}
    c_atompair: ${c_atompair}
    c_token: ${c_token}
  relative_position_encoding:
    r_max: 32
    s_max: 2
    c_z: ${c_z}
  template_embedder:
    c: 64
    c_z: ${c_z}
    n_blocks: null
    dropout: 0.25
    blocks_per_ckpt: ${blocks_per_ckpt}
  pairformer:
    n_blocks: ${n_blocks}
    c_z: ${c_z}
    c_s: ${c_s}
    n_heads: 16
    dropout: 0.25
    blocks_per_ckpt: ${blocks_per_ckpt}
  decoder:
    c_s: ${c_s}
    layer_norm_eps: 1e-6
  diffusion_module:
    use_fine_grained_checkpoint: true
    do_fourier_embed_seq: false
    do_lm_skip_connection: false
    sigma_data: ${sigma_data}
    c_token: 640
    c_atom: ${c_atom}
    c_atompair: ${c_atompair}
    c_z: ${c_z}
    c_s: ${c_s}
    c_s_inputs: ${c_s_inputs}
    initialization:
      zero_init_condition_transition: false
      zero_init_atom_encoder_residual_linear: false
      he_normal_init_atom_encoder_small_mlp: false
      he_normal_init_atom_encoder_output: false
      glorot_init_self_attention: false
      zero_init_adaln: true
      zero_init_residual_condition_transition: false
      zero_init_dit_output: true
      zero_init_atom_decoder_linear: false
    atom_encoder:
      n_blocks: 3
      n_heads: 4
    transformer:
      n_blocks: 12
      n_heads: 8
    atom_decoder:
      n_blocks: 3
      n_heads: 4
    blocks_per_ckpt: ${blocks_per_ckpt}
  distogram_head:
    c_z: ${c_z}
    no_bins: ${no_bins}

