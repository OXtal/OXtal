[project]
name = "openfold"
version = "0.1.0"
description = "OpenFold package"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "openfold/__init__.py"
"data" = "openfold/data"
"model" = "openfold/model"
"np" = "openfold/np"
"utils" = "openfold/utils"